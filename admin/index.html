<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Zilpah Idaa</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #FDFAF6; }
    .loading-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #6B4535;
    }
    .loading-logo {
      font-size: 2rem;
      font-weight: 700;
      color: #C8552A;
      font-family: Georgia, serif;
    }
    .loading-sub { font-size: 0.875rem; color: #7A5C50; }
  </style>
</head>
<body>
  <div class="loading-wrap" id="loading">
    <div class="loading-logo">Zilpah Idaa</div>
    <div class="loading-sub">Loading admin panel...</div>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    document.getElementById("loading").style.display = "none";
  </script>
</body>
</html>
